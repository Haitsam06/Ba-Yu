# =============================================================================
# Ba-Yu — Render Blueprint (Infrastructure as Code)
#
# Cara pakai:
# 1. Push file ini ke GitHub
# 2. Buka https://render.com/deploy
# 3. Hubungkan repo GitHub → Render otomatis membaca file ini
# 4. Isi environment variables di dashboard Render
# =============================================================================

services:
  - type: web
    name: bayu
    runtime: docker
    repo: https://github.com/Haitsam06/Ba-Yu
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      # ── App Core ──
      - key: APP_NAME
        value: "Ba-Yu"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false  # Set manually after deploy (your Render URL)

      # ── Database (MongoDB Atlas) ──
      - key: DB_CONNECTION
        value: mongodb
      - key: MONGODB_URI
        sync: false  # Set manually (your MongoDB Atlas connection string)
      - key: MONGODB_DATABASE
        value: bayu

      # ── Session & Cache (no MySQL tables available) ──
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      # ── Sanctum ──
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "43200"

      # ── Mail (Gmail SMTP) ──
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: "Ba-Yu Support"

      # ── Cloudinary ──
      - key: CLOUDINARY_URL
        sync: false

      # ── Firebase (FCM) ──
      - key: FIREBASE_CREDENTIALS
        sync: false

      # ── Google OAuth ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_ALLOWED_AUDIENCES
        sync: false

      # ── Facebook OAuth ──
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        sync: false
