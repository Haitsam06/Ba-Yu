# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              Ba-Yu — Nginx Configuration                                   ║
# ║                                                                            ║
# ║  File ini akan di-copy ke /etc/nginx/sites-available/bayu.conf             ║
# ║  oleh setup-server.sh secara otomatis.                                     ║
# ║                                                                            ║
# ║  Setelah setup SSL dengan Certbot, file ini akan dimodifikasi otomatis     ║
# ║  oleh Certbot untuk menambahkan blok HTTPS (port 443).                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server {
    listen 80;
    listen [::]:80;

    # Ganti dengan domain kamu (atau biarkan _ untuk menerima semua request)
    server_name _;

    root /var/www/bayu/public;
    index index.php index.html;

    charset utf-8;

    # ── Ukuran Upload Maksimal (untuk upload gambar/sertifikat) ───────────
    client_max_body_size 20M;

    # ── Gzip Compression (mempercepat loading) ───────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Assets (Vite build output) — Cache 1 tahun ────────────────
    # Vite menambahkan hash ke nama file, jadi aman di-cache lama.
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static files lainnya (logo, favicon, dll) ────────────────────────
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|otf|eot|css|js)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Laravel Main Route ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM Processing ───────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout untuk request yang lama (upload file besar)
        fastcgi_read_timeout 300;
    }

    # ── Block akses ke file sensitif ─────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # ── Disable logging untuk favicon & robots ───────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Error Pages ──────────────────────────────────────────────────────
    error_page 404 /index.php;
}
